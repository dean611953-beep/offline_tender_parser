name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe with PyInstaller spec
        shell: cmd
        run: |
          pyinstaller TenderParser.spec

      - name: Prepare package
        shell: cmd
        run: |
          mkdir release
          xcopy dist\TenderParser release\TenderParser\ /E /I /Y
          copy start.bat release\TenderParser\start.bat
          copy README.md release\TenderParser\README.md

      - name: Archive package
        run: |
          powershell Compress-Archive -Path release\TenderParser\* -DestinationPath release\TenderParser_windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TenderParser_windows_exe
          path: release/TenderParser_windows.zip
